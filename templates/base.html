<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="deúres">
<meta name="theme-color" content="#6c63ff">
<link rel="manifest" href="/static/manifest.json">
<link rel="apple-touch-icon" href="/static/icon-192.png">
<title>{% block title %}deúres{% endblock %}</title>
<style>
:root {
  --bg: #0f0f13; --bg2: #1a1a23; --bg3: #22222e; --border: #2e2e3e;
  --accent: #6c63ff; --accent2: #a78bfa;
  --green: #4ade80; --red: #f87171; --yellow: #fbbf24;
  --text: #e8e8f0; --text2: #9090aa;
  --radius: 16px; --shadow: 0 6px 28px rgba(0,0,0,.5);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
}
a { color: var(--accent2); text-decoration: none; }
a:hover { text-decoration: underline; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: .4rem;
  padding: .65rem 1.3rem; border: none; border-radius: 10px; cursor: pointer;
  font-size: .9rem; font-weight: 600; transition: opacity .15s, transform .1s;
}
.btn:hover  { opacity: .85; }
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-danger  { background: #7f1d1d; color: var(--red); border: 1px solid #991b1b; }
.btn-warn    { background: #78350f; color: var(--yellow); border: 1px solid #92400e; }
.btn-ghost   { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.btn-sm      { padding: .35rem .75rem; font-size: .78rem; border-radius: 7px; }

input[type=text], input[type=email], input[type=password], select, textarea {
  width: 100%; padding: .7rem 1rem; border-radius: 10px;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text); font-size: .95rem; outline: none; transition: border .2s;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
label { font-size: .78rem; color: var(--text2); display: block; margin: .9rem 0 .3rem; }

.error-box {
  background: #450a0a; border: 1px solid #7f1d1d; color: var(--red);
  border-radius: 10px; padding: .6rem 1rem; font-size: .85rem; margin-bottom: .75rem;
}
.badge {
  display: inline-block; padding: .18rem .55rem; border-radius: 6px;
  font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
}
.badge-admin  { background: rgba(108,99,255,.2); color: var(--accent2); }
.badge-user   { background: var(--bg3); color: var(--text2); }
.badge-banned { background: rgba(248,113,113,.12); color: var(--red); }

#pwa-banner, #notif-banner {
  display: none; position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
  background: var(--accent); color: #fff; border-radius: 12px;
  padding: .7rem 1.2rem; font-size: .9rem; font-weight: 600;
  box-shadow: 0 4px 20px rgba(108,99,255,.5); z-index: 999;
  align-items: center; gap: .6rem; cursor: pointer; white-space: nowrap;
  animation: slideup .3s ease;
}
#pwa-banner.show { display: flex; }
#notif-banner.show { display: flex; }
@keyframes slideup { from { opacity:0; transform: translateX(-50%) translateY(20px); } }
#pwa-banner .pwa-close, #notif-banner .notif-close {
  background: rgba(255,255,255,.2); border: none; color: #fff;
  border-radius: 50%; width: 22px; height: 22px; cursor: pointer;
  font-size: .8rem; display: flex; align-items: center; justify-content: center;
}
</style>
{% block extra_styles %}{% endblock %}
</head>
<body>{% block body %}{% endblock %}

<div id="pwa-banner">
  📲 Instalar deúres
  <button class="pwa-close" id="pwa-close">✕</button>
</div>

<div id="notif-banner">
  🔔 Activar notificaciones
  <button class="notif-close" id="notif-close">✕</button>
</div>

<script>
const VAPID_PUBLIC_KEY = '{{ vapid_public_key }}';

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = atob(base64);
  return new Uint8Array([...raw].map(c => c.charCodeAt(0)));
}

let swReg = null;

async function doSubscribe(reg) {
  try {
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
    });
    await fetch('/api/push/subscribe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(sub)
    });
    document.getElementById('notif-banner').classList.remove('show');
    localStorage.setItem('notif_accepted', '1');
  } catch(e) { console.log('Subscribe failed:', e); }
}

async function setupPush(reg) {
  if (!('PushManager' in window) || !('Notification' in window)) return;
  if (localStorage.getItem('notif_accepted')) {
    // ya aceptó antes, re-suscribir silenciosamente si hace falta
    const existing = await reg.pushManager.getSubscription();
    if (!existing) await doSubscribe(reg);
    return;
  }
  const perm = Notification.permission;
  if (perm === 'granted') {
    await doSubscribe(reg);
  } else if (perm === 'default') {
    // Mostrar banner para que el usuario haga clic (requerido por Chrome)
    setTimeout(() => {
      document.getElementById('notif-banner').classList.add('show');
    }, 3000);
  }
}

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js').then(reg => {
    swReg = reg;
    setTimeout(() => setupPush(reg), 1500);
  });
}

let deferredPrompt;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('pwa-banner').classList.add('show');
});

document.getElementById('pwa-banner').addEventListener('click', async () => {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('pwa-banner').classList.remove('show');
});

document.getElementById('pwa-close').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('pwa-banner').classList.remove('show');
});

window.addEventListener('appinstalled', () => {
  document.getElementById('pwa-banner').classList.remove('show');
});

document.getElementById('notif-banner').addEventListener('click', async () => {
  if (!swReg) return;
  const perm = await Notification.requestPermission();
  if (perm === 'granted') await doSubscribe(swReg);
  else document.getElementById('notif-banner').classList.remove('show');
});

document.getElementById('notif-close').addEventListener('click', e => {
  e.stopPropagation();
  document.getElementById('notif-banner').classList.remove('show');
  localStorage.setItem('notif_accepted', 'dismissed');
});
</script>
</body>
</html>
