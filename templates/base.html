<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>{% block title %}deúres{% endblock %}</title>
<style>
:root {
  --bg: #0f0f13; --bg2: #1a1a23; --bg3: #22222e; --border: #2e2e3e;
  --accent: #6c63ff; --accent2: #a78bfa;
  --green: #4ade80; --red: #f87171; --yellow: #fbbf24;
  --text: #e8e8f0; --text2: #9090aa;
  --radius: 16px; --shadow: 0 6px 28px rgba(0,0,0,.5);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: var(--bg); color: var(--text);
}
a { color: var(--accent2); text-decoration: none; }
a:hover { text-decoration: underline; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: .4rem;
  padding: .65rem 1.3rem; border: none; border-radius: 10px; cursor: pointer;
  font-size: .9rem; font-weight: 600; transition: opacity .15s, transform .1s;
}
.btn:hover  { opacity: .85; }
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-danger  { background: #7f1d1d; color: var(--red); border: 1px solid #991b1b; }
.btn-warn    { background: #78350f; color: var(--yellow); border: 1px solid #92400e; }
.btn-ghost   { background: var(--bg3); color: var(--text2); border: 1px solid var(--border); }
.btn-sm      { padding: .35rem .75rem; font-size: .78rem; border-radius: 7px; }

input[type=text], input[type=email], input[type=password], select, textarea {
  width: 100%; padding: .7rem 1rem; border-radius: 10px;
  border: 1px solid var(--border); background: var(--bg3);
  color: var(--text); font-size: .95rem; outline: none; transition: border .2s;
}
input:focus, select:focus, textarea:focus { border-color: var(--accent); }
label { font-size: .78rem; color: var(--text2); display: block; margin: .9rem 0 .3rem; }

.error-box {
  background: #450a0a; border: 1px solid #7f1d1d; color: var(--red);
  border-radius: 10px; padding: .6rem 1rem; font-size: .85rem; margin-bottom: .75rem;
}
.badge {
  display: inline-block; padding: .18rem .55rem; border-radius: 6px;
  font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .04em;
}
.badge-admin  { background: rgba(108,99,255,.2); color: var(--accent2); }
.badge-user   { background: var(--bg3); color: var(--text2); }
.badge-banned { background: rgba(248,113,113,.12); color: var(--red); }
</style>
{% block extra_styles %}{% endblock %}
</head>
<body>{% block body %}{% endblock %}</body>
</html>
